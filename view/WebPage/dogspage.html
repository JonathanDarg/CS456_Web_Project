<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forever Paws - Dogs</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-sm navbar-dark bg-black">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="../public/images/Logo3.png" width="110" height="60" />
        <span class="brand-text ms-2">Forever Paws</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainMenu">
        <ul class="navbar-nav mx-auto gap-0 text-center">
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-house-door-fill"></i> Home</a></li>
          <li class="nav-item"><a href="dogs.html" class="nav-link"><i class="fa-solid fa-dog"></i> Dogs</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-heart-fill"></i> Adoption</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-star-fill"></i> Care Tips</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-calendar-event-fill"></i> Events</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-person-arms-up"></i> Volunteer</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-envelope-fill"></i> Contact</a></li>
          <li class="nav-item ms-4"><a href="#" class="nav-link fw-semibold"><i class="bi bi-currency-dollar"></i> Donations</a></li>
        </ul>
        <div class="d-flex">
          <a href="#" class="btn btn-outline-light rounded-pill px-4">
            <i class="bi bi-person-fill"></i> Login
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4">Incoming Dogs</h2>
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3" id="dogs-row"></div>

    <div class="text-center mt-4">
      <button type="button" class="btn btn-color btn-lg rounded-pill px-5" onclick="addDog()">
        <i class="bi bi-plus-circle-fill me-2"></i> Add Dog
      </button>
    </div>
  </div>

  <!-- Dog Modal -->
  <div class="modal fade" id="dogModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="dogModalLabel">Dog Information</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form id="dogForm" class="was-validated">
          <div class="modal-body">
            <input type="hidden" id="dog_id">

            <div class="mb-3">
              <label for="dog_name" class="form-label">Name</label>
              <input type="text" class="form-control" id="dog_name" required>
            </div>

            <div class="mb-3">
              <label for="dog_breed" class="form-label">Breed</label>
              <input type="text" class="form-control" id="dog_breed" required>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="dog_age" class="form-label">Age</label>
                <input type="number" min="0" max="25" class="form-control" id="dog_age" required>
              </div>
              <div class="col-md-6">
                <label for="dog_gender" class="form-label">Gender</label>
                <select class="form-select" id="dog_gender" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label for="dog_description" class="form-label">Description</label>
              <textarea class="form-control" id="dog_description" rows="3" required></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button type="submit" class="btn btn-color">Save</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-white py-5 mt-auto">
    <div class="container text-center">
      <h2 class="mb-3">Request More Information</h2>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <p>Forever Paws is dedicated to finding forever homes for dogs.</p>
        </div>
      </div>
      <div class="mt-3">
        <button type="button" onclick="SayContact()" class="btn btn-primary btn-lg rounded-pill px-5">
          Contact Us
        </button>
      </div>
      <div class="mt-3 small">© 2026 Forever Paws.</div>
      <hr class="border-light my-3" />
      <div class="row text-center text-md-start align-items-center">
        <div class="col-md-4 mb-4 mb-md-0 text-center">
          <a href="#"><img src="../public/images/Logo3.png" width="120" alt="Forever Paws Logo" /></a>
        </div>
        <div class="col-md-4 mb-4 mb-md-0">
          <div class="d-flex justify-content-center gap-4 footer-links">
            <a href="dogs.html" class="text-white text-decoration-none">Dogs</a>
            <a href="adoption.html" class="text-white text-decoration-none">Adoption</a>
            <a href="donate.html" class="text-white text-decoration-none">Donate</a>
          </div>
        </div>
        <div class="col-md-4 text-center">
          <div class="d-flex justify-content-center gap-4 fs-4">
            <a href="https://facebook.com" target="_blank" rel="noreferrer" class="text-white"><i class="bi bi-facebook"></i></a>
            <a href="https://instagram.com" target="_blank" rel="noreferrer" class="text-white"><i class="bi bi-instagram"></i></a>
            <a href="https://linkedin.com" target="_blank" rel="noreferrer" class="text-white"><i class="bi bi-linkedin"></i></a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./index.js"></script>

  <script>
    let lstDogs = [];

    const dogsRow  = document.getElementById("dogs-row");
    const dogModal = new bootstrap.Modal(document.getElementById("dogModal"));

    async function loadDogs() {
      try {
        const res = await fetch("/dog");
        lstDogs = await res.json();
      } catch (e) {
        lstDogs = [];
      }
      renderDogs();
    }

    function renderDogs() {
      dogsRow.innerHTML = "";
      lstDogs.forEach(dog => {
        const col = document.createElement("div");
        col.className = "col";
        col.innerHTML = `
          <div class="card h-100 shadow-sm">
            <img src="../public/images/bg2.png" class="card-img-top" style="height:130px; object-fit:cover;">
            <div class="card-body d-flex flex-column p-2" style="font-size:0.95rem;">

              <h5 class="text-center fw-bold mb-1">${dog.name}</h5>
              <p class="text-center text-muted mb-2" style="font-size:0.85rem;">${dog.description}</p>
              <p class="mb-1"><strong>Breed:</strong> ${dog.breed}</p>
              <p class="mb-1"><strong>Age:</strong> ${dog.age}</p>
              <p class="mb-1"><strong>Gender:</strong> ${dog.gender}</p>
              <p class="mb-2"><strong>Approved:</strong> ${dog.is_approved ? '<span class="text-success">Yes</span>' : '<span class="text-danger">No</span>'}</p>

              <div class="d-flex justify-content-center gap-2 fs-5 mt-auto">
                <a onclick="editDog(${dog._id})" style="cursor:pointer;" title="Edit"><i class="bi bi-pencil-square text-primary"></i></a>
                <a onclick="deleteDog(${dog._id})" style="cursor:pointer;" title="Delete"><i class="bi bi-trash text-danger"></i></a>
                <a onclick="approveDog(${dog._id})" style="cursor:pointer;" title="Approve"><i class="bi bi-check-circle text-success"></i></a>
                <a onclick="denyDog(${dog._id})" style="cursor:pointer;" title="Deny"><i class="bi bi-x-circle text-secondary"></i></a>
              </div>

            </div>
          </div>`;
        dogsRow.appendChild(col);
      });
    }

    function approveDog(id) {
      const dog = lstDogs.find(d => d._id === id);
      if (dog) { dog.is_approved = 1; renderDogs(); }
    }

    function denyDog(id) {
      const dog = lstDogs.find(d => d._id === id);
      if (dog) { dog.is_approved = 0; renderDogs(); }
    }

    function deleteDog(id) {
      if (confirm("Delete this dog?")) {
        const idx = lstDogs.findIndex(d => d._id === id);
        if (idx > -1) { lstDogs.splice(idx, 1); renderDogs(); }
      }
    }

    function editDog(id) {
      const dog = lstDogs.find(d => d._id === id);
      if (!dog) return;
      document.getElementById("dogModalLabel").textContent  = "Edit Dog";
      document.getElementById("dog_id").value = dog._id;
      document.getElementById("dog_name").value = dog.name;
      document.getElementById("dog_breed").value = dog.breed;
      document.getElementById("dog_age").value = dog.age;
      document.getElementById("dog_gender").value = dog.gender;
      document.getElementById("dog_description").value = dog.description;
      document.getElementById("dogForm").classList.remove("was-validated");
      dogModal.show();
    }

    function addDog() {
      document.getElementById("dogModalLabel").textContent = "Add New Dog";
      document.getElementById("dogForm").reset();
      document.getElementById("dog_id").value = "";
      document.getElementById("dogForm").classList.remove("was-validated");
      dogModal.show();
    }

    document.getElementById("dogForm").addEventListener("submit", function (e) {
      e.preventDefault();
      if (!this.checkValidity()) { this.classList.add("was-validated"); return; }

      const id = document.getElementById("dog_id").value;
      const name = document.getElementById("dog_name").value.trim();
      const breed = document.getElementById("dog_breed").value.trim();
      const age = parseInt(document.getElementById("dog_age").value);
      const gender = document.getElementById("dog_gender").value;
      const description = document.getElementById("dog_description").value.trim();

      if (id) {
        const dog = lstDogs.find(d => d._id == id);
        if (dog) { dog.name = name; dog.breed = breed; dog.age = age; dog.gender = gender; dog.description = description; }
      } else {
        lstDogs.push({ _id: Date.now(), name, breed, age, gender, description, is_approved: 0 });
      }

      renderDogs();
      dogModal.hide();
    });

    loadDogs();
  </script>

</body>
</html>
