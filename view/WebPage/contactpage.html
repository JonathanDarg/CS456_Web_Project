<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forever Paws - Contact Messages</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-sm navbar-dark bg-black">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="../public/images/Logo3.png" width="110" height="60" />
        <span class="brand-text ms-2">Forever Paws</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainMenu">
        <ul class="navbar-nav mx-auto gap-0 text-center">
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-house-door-fill"></i> Home</a></li>
          <li class="nav-item"><a href="dogs.html" class="nav-link"><i class="fa-solid fa-dog"></i> Dogs</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-heart-fill"></i> Adoption</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-star-fill"></i> Care Tips</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-calendar-event-fill"></i> Events</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-person-arms-up"></i> Volunteer</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-envelope-fill"></i> Contact</a></li>
          <li class="nav-item ms-4"><a href="#" class="nav-link fw-semibold"><i class="bi bi-currency-dollar"></i> Donations</a></li>
        </ul>
        <div class="d-flex">
          <a href="#" class="btn btn-outline-light rounded-pill px-4">
            <i class="bi bi-person-fill"></i> Login
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4">Contact Messages</h2>
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3" id="contacts-row"></div>

    <div class="text-center mt-4">
      <button type="button" class="btn btn-color btn-lg rounded-pill px-5" onclick="addContact()">
        <i class="bi bi-plus-circle-fill me-2"></i> Add Message
      </button>
    </div>
  </div>

  <!-- Contact Modal -->
  <div class="modal fade" id="contactModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="contactModalLabel">Contact Information</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form id="contactForm" class="was-validated">
          <div class="modal-body">
            <input type="hidden" id="contact_id">

            <div class="mb-3">
              <label for="contact_name" class="form-label">Name</label>
              <input type="text" class="form-control" id="contact_name" required>
            </div>

            <div class="mb-3">
              <label for="contact_message" class="form-label">Message</label>
              <textarea class="form-control" id="contact_message" rows="3" required></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button type="submit" class="btn btn-color">Save</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-white py-5 mt-auto">
    <div class="container text-center">
      <h2 class="mb-3">Request More Information</h2>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <p>Forever Paws is dedicated to finding forever homes for dogs.</p>
        </div>
      </div>
      <div class="mt-3">
        <button type="button" onclick="SayContact()" class="btn btn-primary btn-lg rounded-pill px-5">
          Contact Us
        </button>
      </div>
      <div class="mt-3 small">© 2026 Forever Paws.</div>
      <hr class="border-light my-3" />
      <div class="row text-center text-md-start align-items-center">
        <div class="col-md-4 mb-4 mb-md-0 text-center">
          <a href="#"><img src="../public/images/Logo3.png" width="120" alt="Forever Paws Logo" /></a>
        </div>
        <div class="col-md-4 mb-4 mb-md-0">
          <div class="d-flex justify-content-center gap-4 footer-links">
            <a href="dogs.html" class="text-white text-decoration-none">Dogs</a>
            <a href="adoption.html" class="text-white text-decoration-none">Adoption</a>
            <a href="donate.html" class="text-white text-decoration-none">Donate</a>
          </div>
        </div>
        <div class="col-md-4 text-center">
          <div class="d-flex justify-content-center gap-4 fs-4">
            <a href="https://facebook.com" target="_blank" rel="noreferrer" class="text-white"><i class="bi bi-facebook"></i></a>
            <a href="https://instagram.com" target="_blank" rel="noreferrer" class="text-white"><i class="bi bi-instagram"></i></a>
            <a href="https://linkedin.com" target="_blank" rel="noreferrer" class="text-white"><i class="bi bi-linkedin"></i></a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./index.js"></script>

  <script>
    let lstContacts = [];

    const contactsRow  = document.getElementById("contacts-row");
    const contactModal = new bootstrap.Modal(document.getElementById("contactModal"));

    async function loadContacts() {
      try {
        const res = await fetch("/contact");
        lstContacts = await res.json();
      } catch (e) {
        lstContacts = [];
      }
      renderContacts();
    }

    function renderContacts() {
      contactsRow.innerHTML = "";
      lstContacts.forEach(contact => {
        const col = document.createElement("div");
        col.className = "col";
        col.innerHTML = `
          <div class="card h-100 shadow-sm">
            <div class="card-body d-flex flex-column p-3" style="font-size:0.95rem;">

              <p class="mb-1"><strong>Name:</strong> ${contact.name}</p>
              <p class="mb-2"><strong>Message:</strong> ${contact.message}</p>

              <div class="d-flex justify-content-center gap-2 fs-5 mt-auto">
                <a onclick="editContact('${contact._id}')" style="cursor:pointer;" title="Edit"><i class="bi bi-pencil-square text-primary"></i></a>
                <a onclick="deleteContact('${contact._id}')" style="cursor:pointer;" title="Delete"><i class="bi bi-trash text-danger"></i></a>
              </div>

            </div>
          </div>`;
        contactsRow.appendChild(col);
      });
    }

    async function deleteContact(id) {
      if (confirm("Delete this contact message?")) {
        try {
          await fetch(`/contact/delete/${id}`, { method: "GET" });
        } catch (e) {}
        lstContacts = lstContacts.filter(c => c._id != id);
        renderContacts();
      }
    }

    function editContact(id) {
      const contact = lstContacts.find(c => c._id == id);
      if (!contact) return;
      document.getElementById("contactModalLabel").textContent = "Edit Message";
      document.getElementById("contact_id").value      = contact._id;
      document.getElementById("contact_name").value    = contact.name;
      document.getElementById("contact_message").value = contact.message;
      document.getElementById("contactForm").classList.remove("was-validated");
      contactModal.show();
    }

    function addContact() {
      document.getElementById("contactModalLabel").textContent = "Add New Message";
      document.getElementById("contactForm").reset();
      document.getElementById("contact_id").value = "";
      document.getElementById("contactForm").classList.remove("was-validated");
      contactModal.show();
    }

    document.getElementById("contactForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      if (!this.checkValidity()) { this.classList.add("was-validated"); return; }

      const id      = document.getElementById("contact_id").value;
      const name    = document.getElementById("contact_name").value.trim();
      const message = document.getElementById("contact_message").value.trim();

      try {
        if (id) {
          // Update
          await fetch("/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ txt_id: id, name, message })
          });
          const contact = lstContacts.find(c => c._id == id);
          if (contact) { contact.name = name; contact.message = message; }
        } else {
          // Create
          const res = await fetch("/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, message })
          });
          const newContact = await res.json();
          lstContacts.push(newContact);
        }
      } catch (e) {
        if (id) {
          const contact = lstContacts.find(c => c._id == id);
          if (contact) { contact.name = name; contact.message = message; }
        } else {
          lstContacts.push({ _id: Date.now(), name, message });
        }
      }

      renderContacts();
      contactModal.hide();
    });

    loadContacts();
  </script>

</body>
</html>
